<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ousi's Universe | 05.07</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div id="hacker-screen" class="hidden">
        <div class="terminal-text">
            <p>> ACCESSING OUSI.SYS...</p>
            <p>> ERROR: PERSONALITY_INTENSITY_TOO_HIGH</p>
            <p>> OVERRIDING SECURITY PROTOCOLS...</p>
            <p>> LOADING CELEBRATION MODULE...</p>
        </div>
    </div>

    <div id="main-canvas">
        <div class="vignette"></div>
        
        <div class="content">
            <header>
                <h1 class="target-title">OUSI</h1>
                <p class="date-tag">MAY 07 • 2026</p>
                <div id="timer">00d 00h 00m 00s</div>
            </header>

            <div class="orbital-system">
                <div class="node bubbles" onclick="trigger('bubbles')"></div>
                <div class="node catwoman" onclick="trigger('catwoman')"></div>
                <div class="node fluttershy" onclick="trigger('fluttershy')"></div>
            </div>

            <div class="status-box">
                <p id="status-text">INITIALIZING UNIVERSE...</p>
            </div>

            <button id="action-trigger">SYSTEM CHECK</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
